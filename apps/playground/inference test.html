<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>PaperMd — Inference Test</title>
        <style>
            body {
                font-family: monospace;
                max-width: 900px;
                margin: 40px auto;
                padding: 0 20px;
            }
            canvas {
                border: 1px solid #ccc;
                max-width: 100%;
            }
            pre {
                background: #f4f4f4;
                padding: 12px;
                overflow-x: auto;
                font-size: 13px;
            }
            .box {
                position: absolute;
                border: 2px solid;
                pointer-events: none;
            }
            #wrap {
                position: relative;
                display: inline-block;
            }
            .log {
                color: #555;
                margin: 2px 0;
            }
            .ok {
                color: green;
            }
            .err {
                color: red;
            }
            button {
                padding: 8px 16px;
                margin: 4px;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <h2>PaperMd Inference Test</h2>

        <input type="file" id="imgInput" accept="image/*" />
        <input type="file" id="modelInput" accept=".onnx" />
        <br /><br />
        <button id="btnDetect">1. Run Layout Model</button>
        <button id="btnOCR">2. Run OCR on Plain_Text crops</button>
        <br /><br />

        <div id="wrap">
            <canvas id="canvas"></canvas>
        </div>

        <pre id="log">Waiting...</pre>
        <pre id="ast">{}</pre>

        <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
        <!-- Replace the tesseract script tag with this -->
        <script src="https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1/dist/transformers.min.js"></script>
        <script>
            // ─── Config ───────────────────────────────────────────────────────────────────

            const CLASS_NAMES = [
                "Abandon",
                "Plain_Text",
                "Formula",
                "Figure",
                "Table",
                "Link",
                "Callout",
            ];
            const COLOURS = [
                "#e74c3c",
                "#3498db",
                "#2ecc71",
                "#f39c12",
                "#9b59b6",
                "#1abc9c",
                "#e67e22",
            ];
            const CONF_THRESH = 0.25;
            const MODEL_SIZE = 1280; // must match your training imgsz

            // ─── State ────────────────────────────────────────────────────────────────────

            let session = null;
            let imageEl = null;
            let detections = [];

            // ─── Logging ──────────────────────────────────────────────────────────────────

            function log(msg, type = "log") {
                const pre = document.getElementById("log");
                pre.innerHTML += `<span class="${type}">${msg}</span>\n`;
                pre.scrollTop = pre.scrollHeight;
            }

            // ─── Load model when file chosen ──────────────────────────────────────────────

            document
                .getElementById("modelInput")
                .addEventListener("change", async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    log(`Loading model: ${file.name} ...`);
                    try {
                        const buffer = await file.arrayBuffer();
                        session = await ort.InferenceSession.create(buffer, {
                            executionProviders: ["webgl", "wasm"],
                        });
                        log(
                            `✓ Model loaded. Inputs: ${session.inputNames}`,
                            "ok",
                        );
                    } catch (err) {
                        log(`✗ Model load failed: ${err}`, "err");
                    }
                });

            // ─── Load image when file chosen ─────────────────────────────────────────────

            document
                .getElementById("imgInput")
                .addEventListener("change", (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const url = URL.createObjectURL(file);
                    imageEl = new Image();
                    imageEl.onload = () => {
                        const canvas = document.getElementById("canvas");
                        canvas.width = imageEl.naturalWidth;
                        canvas.height = imageEl.naturalHeight;
                        canvas.getContext("2d").drawImage(imageEl, 0, 0);
                        log(
                            `✓ Image loaded: ${imageEl.naturalWidth}×${imageEl.naturalHeight}`,
                            "ok",
                        );
                        // clear old boxes
                        document
                            .querySelectorAll(".box")
                            .forEach((b) => b.remove());
                        detections = [];
                        document.getElementById("ast").textContent = "{}";
                    };
                    imageEl.src = url;
                });

            // ─── Preprocess ───────────────────────────────────────────────────────────────

            function preprocess(img, size) {
                const canvas = document.createElement("canvas");
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext("2d");

                // Letterbox — maintain aspect ratio, pad with grey
                const scale = Math.min(
                    size / img.naturalWidth,
                    size / img.naturalHeight,
                );
                const newW = Math.round(img.naturalWidth * scale);
                const newH = Math.round(img.naturalHeight * scale);
                const padX = Math.round((size - newW) / 2);
                const padY = Math.round((size - newH) / 2);

                ctx.fillStyle = "#808080";
                ctx.fillRect(0, 0, size, size);
                ctx.drawImage(img, padX, padY, newW, newH);

                const { data } = ctx.getImageData(0, 0, size, size);
                const float32 = new Float32Array(3 * size * size);

                for (let i = 0; i < size * size; i++) {
                    float32[0 * size * size + i] = data[i * 4 + 0] / 255; // R
                    float32[1 * size * size + i] = data[i * 4 + 1] / 255; // G
                    float32[2 * size * size + i] = data[i * 4 + 2] / 255; // B
                }

                return { float32, scale, padX, padY };
            }

            // ─── NMS ──────────────────────────────────────────────────────────────────────

            function iou(a, b) {
                const x1 = Math.max(a.x, b.x),
                    y1 = Math.max(a.y, b.y);
                const x2 = Math.min(a.x + a.w, b.x + b.w);
                const y2 = Math.min(a.y + a.h, b.y + b.h);
                const inter = Math.max(0, x2 - x1) * Math.max(0, y2 - y1);
                return inter / (a.w * a.h + b.w * b.h - inter);
            }

            function nms(dets, iouThresh = 0.45) {
                dets.sort((a, b) => b.conf - a.conf);
                const kept = [];
                for (const d of dets) {
                    if (
                        !kept.some(
                            (k) =>
                                k.classId === d.classId &&
                                iou(d, k) > iouThresh,
                        )
                    )
                        kept.push(d);
                }
                return kept;
            }

            // ─── Run layout model ─────────────────────────────────────────────────────────
            // Derive everything from the tensor dims directly
            // Never assume numClasses from CLASS_NAMES

            document
                .getElementById("btnDetect")
                .addEventListener("click", async () => {
                    if (!session || !imageEl) return;

                    log("Running layout model...");

                    const { float32, scale, padX, padY } = preprocess(
                        imageEl,
                        MODEL_SIZE,
                    );
                    const tensor = new ort.Tensor("float32", float32, [
                        1,
                        3,
                        MODEL_SIZE,
                        MODEL_SIZE,
                    ]);
                    const results = await session.run({ images: tensor });

                    const outTensor = results[session.outputNames[0]];
                    const output = outTensor.data;
                    const dims = outTensor.dims; // [1, 10, 33600]

                    const numFeatures = dims[1]; // 10
                    const numAnchors = dims[2]; // 33600
                    const numClasses = CLASS_NAMES.length; // 6  ← from tensor, not CLASS_NAMES

                    log(
                        `Tensor: [${dims.join(", ")}] → ${numClasses} classes, ${numAnchors} anchors`,
                    );

                    const raw = [];

                    for (let i = 0; i < numAnchors; i++) {
                        // bbox coords are in model input pixel space (0–1280)
                        const cx = output[0 * numAnchors + i];
                        const cy = output[1 * numAnchors + i];
                        const bw = output[2 * numAnchors + i];
                        const bh = output[3 * numAnchors + i];

                        // class scores
                        let maxConf = 0,
                            classId = 0;
                        for (let c = 0; c < numClasses; c++) {
                            const score = output[(4 + c) * numAnchors + i];
                            if (score > maxConf) {
                                maxConf = score;
                                classId = c;
                            }
                        }

                        if (maxConf < 0.01) continue; // ← lowered from 0.25

                        // Undo letterbox → original image pixel coords
                        const x = (cx - bw / 2 - padX) / scale;
                        const y = (cy - bh / 2 - padY) / scale;
                        const w = bw / scale;
                        const h = bh / scale;

                        raw.push({
                            x,
                            y,
                            w,
                            h,
                            conf: maxConf,
                            classId,
                            label: CLASS_NAMES[classId] ?? `class_${classId}`,
                        });
                    }

                    detections = nms(raw);
                    log(`✓ Found ${detections.length} regions`, "ok");
                    detections.forEach((d) =>
                        log(
                            `  ${d.label} (${(d.conf * 100).toFixed(1)}%)  x:${d.x.toFixed(0)} y:${d.y.toFixed(0)} w:${d.w.toFixed(0)} h:${d.h.toFixed(0)}`,
                        ),
                    );

                    drawBoxes();
                    buildAST();
                });
            // ─── Draw bounding boxes on canvas ───────────────────────────────────────────

            function drawBoxes() {
                const canvas = document.getElementById("canvas");
                const ctx = canvas.getContext("2d");
                ctx.drawImage(imageEl, 0, 0);

                detections.forEach((d, i) => {
                    const col = COLOURS[d.classId % COLOURS.length];
                    ctx.strokeStyle = col;
                    ctx.lineWidth = 2;
                    ctx.strokeRect(d.x, d.y, d.w, d.h);

                    ctx.fillStyle = col;
                    ctx.font = "14px monospace";
                    ctx.fillText(
                        `${d.label} ${(d.conf * 100).toFixed(0)}%`,
                        d.x + 4,
                        d.y + 16,
                    );
                });
            }

            // ─── Build skeleton AST from detections ──────────────────────────────────────

            function buildAST() {
                const elements = detections
                    .filter((d) => d.label !== "Abandon")
                    .map((d, i) => ({
                        type: d.label,
                        id: `el_${String(i).padStart(3, "0")}`,
                        bbox: {
                            x: Math.round(d.x),
                            y: Math.round(d.y),
                            width: Math.round(d.w),
                            height: Math.round(d.h),
                        },
                        label: d.label,
                        conf: parseFloat(d.conf.toFixed(3)),
                        // content filled in by OCR step below
                    }));

                document.getElementById("ast").textContent = JSON.stringify(
                    { type: "Page", elements },
                    null,
                    2,
                );
                return elements;
            }

            // ─── Crop helper ─────────────────────────────────────────────────────────────

            function cropToBlob(img, x, y, w, h) {
                const c = document.createElement("canvas");
                c.width = Math.round(w);
                c.height = Math.round(h);
                c.getContext("2d").drawImage(
                    img,
                    Math.round(x),
                    Math.round(y),
                    Math.round(w),
                    Math.round(h),
                    0,
                    0,
                    Math.round(w),
                    Math.round(h),
                );
                return new Promise((res) => c.toBlob(res, "image/png"));
            }

            // ─── Run OCR on Plain_Text crops ─────────────────────────────────────────────
            /// Replace the OCR button handler

            let trocr = null; // cache the pipeline so it only loads once

            document
                .getElementById("btnOCR")
                .addEventListener("click", async () => {
                    const textRegions = detections.filter(
                        (d) => d.label === "Plain_Text",
                    );
                    if (!textRegions.length) {
                        log("No Plain_Text regions detected yet", "err");
                        return;
                    }

                    // Load TrOCR on first use — downloads ~300MB, cached after first run
                    if (!trocr) {
                        log("Loading TrOCR model...");

                        trocr = await window.transformers.pipeline(
                            "image-to-text",
                            "Xenova/trocr-small-handwritten",
                            {
                                progress_callback: (p) => {
                                    if (p.status === "downloading") {
                                        const percent = (
                                            (p.loaded / p.total) *
                                            100
                                        ).toFixed(1);
                                        const mb = (
                                            p.loaded / 1_000_000
                                        ).toFixed(1);
                                        const total = (
                                            p.total / 1_000_000
                                        ).toFixed(1);

                                        // Overwrite the same line instead of spamming new ones
                                        const pre =
                                            document.getElementById("log");
                                        const lines = pre.innerHTML.split("\n");
                                        const progressLine = `Downloading ${p.file} — ${mb}MB / ${total}MB (${percent}%)`;

                                        if (
                                            lines[lines.length - 2]?.includes(
                                                "Downloading",
                                            )
                                        ) {
                                            lines[lines.length - 2] =
                                                progressLine;
                                        } else {
                                            lines.push(progressLine);
                                        }

                                        pre.innerHTML = lines.join("\n");
                                    } else if (p.status === "done") {
                                        log(`✓ ${p.file} loaded`, "ok");
                                    }
                                },
                            },
                        );

                        log("✓ TrOCR ready", "ok");
                    }

                    log(
                        `Running TrOCR on ${textRegions.length} Plain_Text region(s)...`,
                    );

                    const ast = JSON.parse(
                        document.getElementById("ast").textContent,
                    );

                    for (let i = 0; i < textRegions.length; i++) {
                        const d = textRegions[i];
                        const blob = await cropToBlob(
                            imageEl,
                            d.x,
                            d.y,
                            d.w,
                            d.h,
                        );
                        const url = URL.createObjectURL(blob);

                        log(
                            `  Processing region ${i + 1} / ${textRegions.length}...`,
                        );

                        const result = await trocr(url);
                        URL.revokeObjectURL(url);

                        const rawText = result[0]?.generated_text?.trim() ?? "";

                        // Build a single line with one span — style detection comes later
                        const lines = [
                            {
                                spans: [{ text: rawText, styles: [] }],
                            },
                        ];

                        const node = ast.elements.find(
                            (el) =>
                                el.bbox.x === Math.round(d.x) &&
                                el.bbox.y === Math.round(d.y),
                        );
                        if (node) {
                            node.type = "TextBlock";
                            node.lines = lines;
                            delete node.label;
                        }

                        log(
                            `  Region ${i + 1}: "${rawText.substring(0, 80)}${rawText.length > 80 ? "..." : ""}"`,
                            "ok",
                        );
                    }

                    document.getElementById("ast").textContent = JSON.stringify(
                        ast,
                        null,
                        2,
                    );
                    log("✓ OCR complete — AST updated", "ok");
                });
        </script>
    </body>
</html>
